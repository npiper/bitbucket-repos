name: Clone Bitbucket Repository

on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone bitbucket
        run: git clone https://x-token-auth:${{ secrets.BITBUCKET_API_TOKEN }}@bitbucket.org/n_piper/personal-mba.git

      - name: Install Node.js and NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: personal-mba
        run: npm install

      - name: Install Antora
        working-directory: personal-mba
        run: npm i antora

      - name: Generate Site
        working-directory: personal-mba
        run: npx antora antora-playbook.yml

      - name: Show site contents
        run: ls -ltra personal-mba/dist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: personal-mba/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4